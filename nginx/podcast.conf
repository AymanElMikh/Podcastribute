# ──────────────────────────────────────────────────────────────
# PodcastAI — Nginx reverse proxy configuration
# Domain : podcast.yourdomain.com
# ──────────────────────────────────────────────────────────────

# HTTP → HTTPS redirect
server {
    listen 80;
    listen [::]:80;
    server_name podcast.yourdomain.com;

    location /.well-known/acme-challenge/ {
        root /var/www/certbot;
    }

    location / {
        return 301 https://$host$request_uri;
    }
}

# HTTPS
server {
    listen 443 ssl http2;
    listen [::]:443 ssl http2;
    server_name podcast.yourdomain.com;

    # ── TLS ────────────────────────────────────────────────────
    ssl_certificate     /etc/letsencrypt/live/podcast.yourdomain.com/fullchain.pem;
    ssl_certificate_key /etc/letsencrypt/live/podcast.yourdomain.com/privkey.pem;
    ssl_protocols       TLSv1.2 TLSv1.3;
    ssl_ciphers         HIGH:!aNULL:!MD5;
    ssl_session_cache   shared:SSL:10m;
    ssl_session_timeout 10m;

    # ── Security headers ───────────────────────────────────────
    add_header Strict-Transport-Security "max-age=63072000; includeSubDomains; preload" always;
    add_header X-Frame-Options DENY always;
    add_header X-Content-Type-Options nosniff always;
    add_header Referrer-Policy strict-origin-when-cross-origin always;

    # ── Upload size — large audio files ────────────────────────
    client_max_body_size 500M;
    client_body_timeout  600s;

    # ── API (FastAPI on :8002) ─────────────────────────────────
    location /v1/ {
        proxy_pass         http://api:8002;
        proxy_http_version 1.1;

        # Required for SSE streaming
        proxy_buffering            off;
        proxy_cache                off;
        proxy_request_buffering    off;

        # Long timeout for audio upload + processing
        proxy_read_timeout  600s;
        proxy_send_timeout  600s;
        proxy_connect_timeout 10s;

        proxy_set_header Host              $host;
        proxy_set_header X-Real-IP         $remote_addr;
        proxy_set_header X-Forwarded-For   $proxy_add_x_forwarded_for;
        proxy_set_header X-Forwarded-Proto $scheme;

        # SSE: keep connection alive
        proxy_set_header Connection "";
    }

    # ── Frontend (Next.js on :3001) ────────────────────────────
    location / {
        proxy_pass         http://frontend:3001;
        proxy_http_version 1.1;

        proxy_buffering   on;
        proxy_read_timeout 60s;

        proxy_set_header Upgrade           $http_upgrade;
        proxy_set_header Connection        "upgrade";
        proxy_set_header Host              $host;
        proxy_set_header X-Real-IP         $remote_addr;
        proxy_set_header X-Forwarded-For   $proxy_add_x_forwarded_for;
        proxy_set_header X-Forwarded-Proto $scheme;
    }

    # ── Static assets — aggressive caching ────────────────────
    location /_next/static/ {
        proxy_pass         http://frontend:3001;
        proxy_cache_valid  200 365d;
        add_header         Cache-Control "public, max-age=31536000, immutable";
    }
}
